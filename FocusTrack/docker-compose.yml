services:
  # ============================================================================
  # Infrastructure
  # ============================================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "FocusTrack!2026"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # Use the bundled sqlcmd; the 2022 image ships it at /opt/mssql-tools18/bin/sqlcmd
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "FocusTrack!2026" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 10s
      retries: 20

  # One-shot init container that creates the two databases the services expect.
  sqlserver-init:
    image: mcr.microsoft.com/mssql-tools:latest
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools/bin/sqlcmd -S sqlserver -U sa -P "FocusTrack!2026" -Q "
          IF DB_ID('SessionDB') IS NULL CREATE DATABASE SessionDB;
          IF DB_ID('NotificationDB') IS NULL CREATE DATABASE NotificationDB;"
    restart: "no"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # OpenTelemetry backend — you don't ship OTel yet but the appsettings expect the host.
  # Leaving this in makes adding OTel a one-line change later.
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  # Mailhog catches all SMTP; EmailService in Notification uses this for the offline fallback.
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ============================================================================
  # Application services
  # ============================================================================
  session-service:
    build:
      context: .
      dockerfile: Session.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SessionDB;User Id=sa;Password=FocusTrack!2026;TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Auth__Authority: ${AUTH_AUTHORITY:-https://dev-unvpthwvrc56tlky.us.auth0.com/}
      Auth__Audience: ${AUTH_AUDIENCE:-https://focustrack-api}
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
    expose:
      - "8080"
    ports:
      - "5101:8080"

  notification-service:
    build:
      context: .
      dockerfile: Notification.Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=NotificationDB;User Id=sa;Password=FocusTrack!2026;TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      Auth__Authority: ${AUTH_AUTHORITY:-https://dev-unvpthwvrc56tlky.us.auth0.com/}
      Auth__Audience: ${AUTH_AUDIENCE:-https://focustrack-api}
      Email__From: system@focustrack.local
      Email__Host: mailhog
      Email__Port: 1025
      Email__Username: ""
      Email__Password: ""
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    expose:
      - "8080"
    ports:
      - "5102:8080"

  reward-worker:
    build:
      context: .
      dockerfile: RewardWorker/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=SessionDB;User Id=sa;Password=FocusTrack!2026;TrustServerCertificate=True;MultipleActiveResultSets=true"
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      sqlserver-init:
        condition: service_completed_successfully

  gateway:
    build:
      context: .
      dockerfile: FocusTrack.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      # ---- Auth0 ----
      # Override these with your real values, either in a .env file or your shell.
      Auth__Authority: ${AUTH_AUTHORITY:-}
      Auth__Domain: ${AUTH_DOMAIN:-}
      Auth__ClientId: ${AUTH_CLIENT_ID:-}
      Auth__ClientSecret: ${AUTH_CLIENT_SECRET:-}
      Auth__Audience: ${AUTH_AUDIENCE:-}
      # ---- Reverse-proxy routing (override the defaults in appsettings.json) ----
      ReverseProxy__Clusters__session-cluster__Destinations__session1__Address: "http://session-service:8080/"
      ReverseProxy__Clusters__notification-cluster__Destinations__notification1__Address: "http://notification-service:8080/"
    depends_on:
      - session-service
      - notification-service
    ports:
      - "5000:8080"

volumes:
  sqlserver-data:
